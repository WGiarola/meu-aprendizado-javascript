<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nacionalidade</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            padding: 20px;
        }

        input {
            padding: 5px;
            width: 150px;
        }

        button {
            padding: 5px 10px;
            cursor: pointer;
        }

        #res {
            margin-top: 20px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>

<body>
    <h1>Sistema de Nacionalidade</h1>
    <p>Em que país você vive ?
        <input type="text" name="txtpaís" id="txtpaís" placeholder="Brasil">
        <input type="button" value="verificar" onclick="verificarNacionalidade()">
    </p>
    <div id="res">

    </div>
    <script>
        function verificarNacionalidade() {
            txtp = document.querySelector('input#txtpaís')
            res = document.querySelector('div#res')
            país = txtp.value
            res.innerHTML = `<p>Vivendo em <strong>${país}</strong>.</p>`
            if (país.toUpperCase() == 'BRASIL') {
                res.innerHTML += `<p>Você é <strong>Brasileiro !</strong></p>`
                res.style.background = 'yellow'
                res.style.color = 'green'
                res.style.border = '5px solid green'
            } else {
                res.innerHTML += `<p>Você é <strong>Estrangeiro!</strong></p>`
                res.style.background = 'grey'
                res.style.color = 'white'
                res.style.border = '5px solid Black'

            

        }    

        }
    </script>
</body>

</html>
